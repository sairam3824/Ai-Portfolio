name: Maintenance Task
description: Track long-term cleanup, dependency work, or operational follow-up.
title: "[Maintenance] "
labels:
  - maintenance
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired Outcome
      placeholder: What should be improved or stabilized?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Dependencies
        - Performance
        - Monitoring
        - Security
        - Shared Data
        - Docs / Runbook
        - Legacy Version Cleanup
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      placeholder: List the areas, workflows, or files involved.
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: Success Criteria
      placeholder: What should be true when this is done?
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: Risks, follow-ups, or links to related runs/issues.
