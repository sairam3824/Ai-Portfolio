name: Uptime Checks

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  uptime:
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ISSUE_TITLE: "[Ops] Uptime checks failing"

    steps:
      - name: Check home page
        run: curl -fsSIL https://saiii.in/

      - name: Check writing page
        run: curl -fsSIL https://saiii.in/writing

      - name: Check sitemap
        run: curl -fsS https://saiii.in/sitemap.xml | grep '<loc>https://saiii.in/writing</loc>'

      - name: Check chat API
        run: |
          status=$(curl -sS -o /tmp/chat-response.json -w '%{http_code}' \
            -X POST https://saiii.in/api/chat \
            -H 'Content-Type: application/json' \
            -d '{"message":"Tell me about Sai Ram."}')
          test "$status" = "200"

      - name: Create or update GitHub issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = [
              "Scheduled uptime checks failed.",
              "",
              `- Workflow run: ${process.env.RUN_URL}`,
              `- Branch: ${context.ref}`,
              `- Commit: ${context.sha}`,
              "",
              "Review the failed endpoint step in the workflow logs and restore service before closing this issue."
            ].join("\n");

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "ops-alert"
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["ops-alert", "uptime"],
              });
            }

      - name: Notify Slack on failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' --data "$(cat <<JSON
          {
            "text": ":rotating_light: Uptime checks failed for ai-portfolio-monorepo.\nRun: ${RUN_URL}"
          }
          JSON
          )" "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Close open issue on recovery
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "ops-alert"
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Uptime checks recovered.\n\n- Workflow run: ${process.env.RUN_URL}`,
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
              });
            }
