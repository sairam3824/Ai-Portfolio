name: Lighthouse Performance

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ISSUE_TITLE: "[Ops] Lighthouse performance regression"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Lighthouse against production pages
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://saiii.in/
            https://saiii.in/writing
            https://saiii.in/projects
            https://saiii.in/contact
          configPath: ./.github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false

      - name: Create or update GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = [
              "Scheduled Lighthouse checks failed.",
              "",
              `- Workflow run: ${process.env.RUN_URL}`,
              `- Branch: ${context.ref}`,
              `- Commit: ${context.sha}`,
              "",
              "Review the uploaded Lighthouse artifacts and workflow logs, then update or close this issue once resolved."
            ].join("\n");

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "ops-alert"
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["ops-alert", "performance"],
              });
            }

      - name: Notify Slack on failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' --data "$(cat <<JSON
          {
            "text": ":warning: Lighthouse performance regression detected for ai-portfolio-monorepo.\nRun: ${RUN_URL}"
          }
          JSON
          )" "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Close open issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "ops-alert"
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Performance checks recovered.\n\n- Workflow run: ${process.env.RUN_URL}`,
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
              });
            }
