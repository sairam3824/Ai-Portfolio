<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & SEO -->
    <title>__SITE_TITLE__</title>
    <meta name="description" content="__SITE_DESCRIPTION__" />
    <meta name="author" content="__AUTHOR_NAME__" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="__CANONICAL_SITE_URL__" />

    <!-- Favicons -->
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Theme color for browsers -->
    <meta name="theme-color" content="#0ea5e9" />

    <!-- Open Graph (link previews) -->
    <meta property="og:title" content="__SITE_TITLE__" />
    <meta property="og:description" content="__SITE_DESCRIPTION__" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__CANONICAL_SITE_URL__" />
    <meta property="og:image" content="__PREVIEW_IMAGE_URL__" />
    <meta property="og:image:alt" content="__SITE_TITLE__ preview" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="__CANONICAL_SITE_URL__" />
    <meta name="twitter:title" content="__SITE_TITLE__" />
    <meta name="twitter:description" content="__SITE_DESCRIPTION__" />
    <meta name="twitter:image" content="__PREVIEW_IMAGE_URL__" />
    <meta name="twitter:creator" content="__TWITTER_HANDLE__" />
    <meta name="twitter:site" content="__TWITTER_HANDLE__" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "__CANONICAL_SITE_URL__#website",
        "url": "__CANONICAL_SITE_URL__",
        "name": "__SITE_NAME__",
        "description": "__SITE_DESCRIPTION__"
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfilePage",
        "@id": "__CANONICAL_SITE_URL__#profilepage",
        "url": "__CANONICAL_SITE_URL__",
        "name": "__SITE_NAME__",
        "mainEntity": {
          "@type": "Person",
          "@id": "__SITE_URL__/#person",
          "name": "__AUTHOR_NAME__",
          "url": "__SITE_URL__"
        }
      }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/core/main.tsx"></script>
  </body>
</html>
